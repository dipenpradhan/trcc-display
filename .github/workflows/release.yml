# SPDX-License-Identifier: Apache-2.0
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"  # vX.Y.Z or vX.Y.Z-suffix

jobs:
  # ── x86_64 release binary ────────────────────────────────────────────
  build-x86_64:
    name: Build x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: release-x86_64

      - name: Build release
        run: cargo build --release --locked
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true

      - name: Strip binary
        run: strip target/release/trcc-display || true

      - name: Archive
        run: |
          cd target/release
          tar czf trcc-display-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz \
            trcc-display \
            --owner=0 --group=0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trcc-display-x86_64
          path: target/release/trcc-display-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz

  # ── aarch64 release binary (cross-compile) ──────────────────────────
  build-aarch64:
    name: Build aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: release-aarch64

      - name: Install cross-compilation deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            aarch64-linux-gnu \
            pkg-config

      - name: Build release (aarch64)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target aarch64-unknown-linux-gnu --locked

      - name: Strip binary
        run: aarch64-linux-gnu-strip target/aarch64-unknown-linux-gnu/release/trcc-display || true

      - name: Archive
        run: |
          cd target/aarch64-unknown-linux-gnu/release
          tar czf trcc-display-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz \
            trcc-display \
            --owner=0 --group=0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trcc-display-aarch64
          path: target/aarch64-unknown-linux-gnu/release/trcc-display-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz

  # ── Docker image ─────────────────────────────────────────────────────
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "latest=$( [[ "$GITHUB_REF_NAME" == v[0-9]*.[0-9]*.[0-9]* ]] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ steps.tag.outputs.latest == 'true' }}
            type=sha

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Publish GitHub Release ──────────────────────────────────────────
  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build-x86_64, build-aarch64]
    steps:
      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: trcc-display-x86_64
          path: artifacts/

      - name: Download aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: trcc-display-aarch64
          path: artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > sha256sums.txt
          cat sha256sums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/sha256sums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}